<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS RESCUE — Disaster Route Optimizer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root {
  --bg:        #050d14;
  --panel:     #0a1520;
  --border:    #0f2a3d;
  --accent:    #00e5ff;
  --danger:    #ff3b3b;
  --warning:   #ffaa00;
  --safe:      #00ff88;
  --rescued:   #00e5ff;
  --text:      #c8dce8;
  --dim:       #4a6a7d;
  --glow:      0 0 12px rgba(0,229,255,0.4);
  --glow-red:  0 0 12px rgba(255,59,59,0.5);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── SCANLINE OVERLAY ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,229,255,0.015) 2px,
    rgba(0,229,255,0.015) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* ── HEADER ── */
header {
  height: 52px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  flex-shrink: 0;
  position: relative;
  z-index: 1000;
}
header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}
.logo {
  font-family: 'Orbitron', monospace;
  font-size: 18px;
  font-weight: 900;
  color: var(--accent);
  letter-spacing: 4px;
  text-shadow: var(--glow);
}
.logo span { color: var(--danger); }
.header-right {
  display: flex;
  align-items: center;
  gap: 20px;
}
.status-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--dim);
}
.pulse-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--safe);
  animation: pulse 1.5s infinite;
}
.pulse-dot.alert { background: var(--danger); animation: pulse-fast 0.6s infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
@keyframes pulse-fast { 0%,100%{opacity:1;} 50%{opacity:0.2;} }

.view-toggle {
  display: flex;
  gap: 4px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 3px;
}
.view-btn {
  padding: 4px 12px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  border: none;
  border-radius: 3px;
  cursor: pointer;
  background: transparent;
  color: var(--dim);
  transition: all 0.2s;
}
.view-btn.active {
  background: var(--accent);
  color: var(--bg);
  box-shadow: var(--glow);
}

/* ── MAIN LAYOUT ── */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── MAP ── */
#map {
  flex: 1;
  position: relative;
  z-index: 1;
}
.leaflet-container {
  background: #050d14 !important;
}

/* Custom dark tile filter */
.dark-tiles { filter: brightness(0.3) saturate(0.4) hue-rotate(180deg); }

/* ── SVG OVERLAY ── */
#svg-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 400;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 320px;
  background: var(--panel);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}

.sidebar-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.tab {
  flex: 1;
  padding: 12px 6px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  text-align: center;
  cursor: pointer;
  color: var(--dim);
  border: none;
  background: transparent;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.tab-content { display: none; flex: 1; overflow-y: auto; padding: 14px; }
.tab-content.active { display: flex; flex-direction: column; gap: 12px; }
.tab-content::-webkit-scrollbar { width: 4px; }
.tab-content::-webkit-scrollbar-track { background: transparent; }
.tab-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── SECTION LABEL ── */
.sec-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--dim);
  text-transform: uppercase;
  margin-bottom: 6px;
}

/* ── CARDS ── */
.card {
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px;
}
.card-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--accent);
  margin-bottom: 10px;
  font-family: 'Share Tech Mono', monospace;
}

/* ── BUTTONS ── */
.btn {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--border);
  background: rgba(0,229,255,0.06);
  color: var(--accent);
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 1px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 8px;
}
.btn:hover { background: rgba(0,229,255,0.15); box-shadow: var(--glow); }
.btn.danger { border-color: var(--danger); color: var(--danger); background: rgba(255,59,59,0.06); }
.btn.danger:hover { background: rgba(255,59,59,0.15); box-shadow: var(--glow-red); }
.btn.success { border-color: var(--safe); color: var(--safe); background: rgba(0,255,136,0.06); }
.btn.warning-btn { border-color: var(--warning); color: var(--warning); background: rgba(255,170,0,0.06); }
.btn:disabled { opacity: 0.3; cursor: not-allowed; }
.btn .icon { font-size: 14px; }

/* ── SELECT / INPUT ── */
select, input[type=text], input[type=password] {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  padding: 8px 10px;
  border-radius: 4px;
  outline: none;
  transition: border-color 0.2s;
}
select:focus, input:focus { border-color: var(--accent); }
select option { background: var(--panel); }
label {
  font-size: 11px;
  color: var(--dim);
  letter-spacing: 1px;
  display: block;
  margin-bottom: 4px;
  font-family: 'Share Tech Mono', monospace;
}

/* ── LOG ── */
.log {
  background: rgba(0,0,0,0.4);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px;
  max-height: 180px;
  overflow-y: auto;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  line-height: 1.7;
}
.log::-webkit-scrollbar { width: 3px; }
.log::-webkit-scrollbar-thumb { background: var(--border); }
.log-entry { padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
.log-entry.info  { color: var(--accent); }
.log-entry.alert { color: var(--danger); }
.log-entry.ok    { color: var(--safe); }
.log-entry.warn  { color: var(--warning); }

/* ── STATS BAR ── */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 8px;
}
.stat {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 8px;
  text-align: center;
}
.stat-val {
  font-family: 'Orbitron', monospace;
  font-size: 20px;
  font-weight: 700;
  line-height: 1;
}
.stat-val.cyan   { color: var(--accent); text-shadow: var(--glow); }
.stat-val.red    { color: var(--danger); text-shadow: var(--glow-red); }
.stat-val.green  { color: var(--safe); }
.stat-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px;
  color: var(--dim);
  letter-spacing: 1px;
  margin-top: 4px;
}

/* ── NODE LIST ── */
.node-list { display: flex; flex-direction: column; gap: 4px; }
.node-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: 4px;
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.5px;
}
.node-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.node-dot.safe    { background: var(--safe); box-shadow: 0 0 6px var(--safe); }
.node-dot.warning { background: var(--warning); box-shadow: 0 0 6px var(--warning); }
.node-dot.danger  { background: var(--danger); box-shadow: 0 0 6px var(--danger); }
.node-badge {
  margin-left: auto;
  font-size: 9px;
  font-family: 'Share Tech Mono', monospace;
  padding: 2px 6px;
  border-radius: 2px;
}
.node-badge.safe    { background: rgba(0,255,136,0.12); color: var(--safe); }
.node-badge.warning { background: rgba(255,170,0,0.12); color: var(--warning); }
.node-badge.danger  { background: rgba(255,59,59,0.12); color: var(--danger); }

/* ── LOGIN OVERLAY ── */
#login-overlay {
  position: fixed;
  inset: 0;
  background: rgba(5,13,20,0.95);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9000;
  backdrop-filter: blur(4px);
}
.login-box {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 36px;
  width: 340px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  position: relative;
}
.login-box::before {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}
.login-title {
  font-family: 'Orbitron', monospace;
  font-size: 14px;
  font-weight: 900;
  color: var(--accent);
  letter-spacing: 3px;
  text-align: center;
  text-shadow: var(--glow);
}
.login-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--dim);
  text-align: center;
  letter-spacing: 2px;
}
.login-btn {
  padding: 12px;
  background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(0,229,255,0.05));
  border: 1px solid var(--accent);
  color: var(--accent);
  font-family: 'Orbitron', monospace;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
  width: 100%;
}
.login-btn:hover { background: rgba(0,229,255,0.25); box-shadow: var(--glow); }
.login-hint {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--dim);
  text-align: center;
  opacity: 0.6;
}
.login-err {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--danger);
  text-align: center;
  display: none;
}

/* ── TOOLTIP ── */
.map-tooltip {
  position: absolute;
  background: var(--panel);
  border: 1px solid var(--accent);
  border-radius: 4px;
  padding: 8px 12px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  pointer-events: none;
  z-index: 500;
  display: none;
  white-space: nowrap;
  box-shadow: var(--glow);
}

/* ── ANIMATION CLASSES ── */
@keyframes node-pulse {
  0%,100% { r: 10; opacity: 1; }
  50%      { r: 16; opacity: 0.6; }
}
@keyframes route-draw {
  from { stroke-dashoffset: 1000; }
  to   { stroke-dashoffset: 0; }
}
@keyframes hazard-spread {
  0%   { r: 8; opacity: 0.8; }
  100% { r: 40; opacity: 0; }
}
.route-line {
  stroke-dasharray: 1000;
  stroke-dashoffset: 1000;
  animation: route-draw 1.5s ease forwards;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div id="login-overlay">
  <div class="login-box">
    <div class="login-title">NEXUS RESCUE</div>
    <div class="login-sub">ADMIN AUTHENTICATION REQUIRED</div>
    <div>
      <label>USERNAME</label>
      <input type="text" id="login-user" placeholder="admin" value="admin"/>
    </div>
    <div>
      <label>PASSWORD</label>
      <input type="password" id="login-pass" placeholder="••••••••"/>
    </div>
    <div class="login-err" id="login-err">⚠ INVALID CREDENTIALS</div>
    <button class="login-btn" onclick="doLogin()">ACCESS SYSTEM</button>
    <div class="login-hint">hint: admin / nexus123 &nbsp;|&nbsp; or skip to public view</div>
    <button class="login-btn" style="background:transparent;border-color:var(--dim);color:var(--dim);font-size:10px;" onclick="publicView()">CONTINUE AS PUBLIC →</button>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">NEXUS <span>RESCUE</span></div>
  <div class="header-right">
    <div class="status-indicator">
      <div class="pulse-dot" id="sys-dot"></div>
      <span id="sys-status">SYSTEM NOMINAL</span>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" id="btn-admin" onclick="switchView('admin')">ADMIN</button>
      <button class="view-btn" id="btn-public" onclick="switchView('public')">PUBLIC</button>
    </div>
  </div>
</header>

<!-- MAIN -->
<div class="main">
  <!-- MAP AREA -->
  <div style="flex:1;position:relative;">
    <div id="map"></div>
    <svg id="svg-overlay"></svg>
    <div class="map-tooltip" id="tooltip"></div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-tabs">
      <button class="tab active" onclick="openTab('tab-control')">CONTROL</button>
      <button class="tab" onclick="openTab('tab-map')">MAP</button>
      <button class="tab" onclick="openTab('tab-log')">LOG</button>
    </div>

    <!-- CONTROL TAB -->
    <div class="tab-content active" id="tab-control">
      <div class="stats-bar">
        <div class="stat"><div class="stat-val cyan" id="s-safe">7</div><div class="stat-label">SAFE</div></div>
        <div class="stat"><div class="stat-val red"  id="s-danger">0</div><div class="stat-label">DANGER</div></div>
        <div class="stat"><div class="stat-val green" id="s-rescued">0</div><div class="stat-label">RESCUED</div></div>
      </div>

      <div class="card" id="admin-section">
        <div class="card-title">⚡ HAZARD CONTROL</div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <div>
            <label>DISASTER ORIGIN</label>
            <select id="hazard-origin">
              <option value="">— select location —</option>
            </select>
          </div>
          <div>
            <label>SPREAD RADIUS</label>
            <select id="hazard-level">
              <option value="1">Level 1 — Immediate area</option>
              <option value="2">Level 2 — Wide spread</option>
              <option value="3">Level 3 — City-wide</option>
            </select>
          </div>
          <button class="btn danger" onclick="triggerHazard()"><span class="icon">🌊</span> TRIGGER DISASTER</button>
          <button class="btn" onclick="resetMap()"><span class="icon">↺</span> RESET MAP</button>
        </div>
      </div>

      <div class="card" id="admin-section2">
        <div class="card-title">🚁 RESCUE OPERATION</div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <div>
            <label>RESCUE TEAM ORIGIN</label>
            <select id="team-origin">
              <option value="">— select base —</option>
            </select>
          </div>
          <div>
            <label>VICTIM LOCATION</label>
            <select id="victim-loc">
              <option value="">— select target —</option>
            </select>
          </div>
          <button class="btn success" onclick="runRescue()"><span class="icon">▶</span> COMPUTE RESCUE ROUTE</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">📡 QUICK ACTIONS</div>
        <div style="display:flex;flex-direction:column;gap:6px;">
          <button class="btn warning-btn" onclick="runBFSAnimation()"><span class="icon">🔴</span> ANIMATE HAZARD SPREAD</button>
          <button class="btn" onclick="showAllRoutes()"><span class="icon">🗺</span> SHOW ALL ROUTES</button>
          <button class="btn danger" id="lock-btn" onclick="lockRoad()" style="display:none;"><span class="icon">🚧</span> BLOCK SELECTED ROAD</button>
        </div>
      </div>
    </div>

    <!-- MAP TAB -->
    <div class="tab-content" id="tab-map">
      <div class="sec-label">LOCATION STATUS</div>
      <div class="node-list" id="node-list"></div>
    </div>

    <!-- LOG TAB -->
    <div class="tab-content" id="tab-log">
      <div class="sec-label">SYSTEM LOG</div>
      <div class="log" id="sys-log"></div>
      <button class="btn" style="margin-top:4px;" onclick="clearLog()"><span class="icon">🗑</span> CLEAR LOG</button>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════
 *  DATA — Dhaka locations with real lat/lng
 * ══════════════════════════════════════════════════════ */
const NODES = [
  { id:0, name:"Mirpur",      lat:23.8041, lng:90.3664 },
  { id:1, name:"Farmgate",    lat:23.7591, lng:90.3897 },
  { id:2, name:"Gulshan",     lat:23.7806, lng:90.4152 },
  { id:3, name:"Mohakhali",   lat:23.7770, lng:90.4050 },
  { id:4, name:"Dhanmondi",   lat:23.7461, lng:90.3742 },
  { id:5, name:"Motijheel",   lat:23.7330, lng:90.4178 },
  { id:6, name:"Badda",       lat:23.7772, lng:90.4367 },
];

const EDGES = [
  [0,1,5], [1,2,4], [1,4,3], [2,3,2],
  [3,6,3], [6,5,6], [4,5,7], [0,4,8], [3,5,5]
];

/* ══════════════════════════════════════════════════════
 *  STATE
 * ══════════════════════════════════════════════════════ */
let state = {
  hazardLevel: new Array(7).fill(0),  // 0=safe,1=warn,2=danger
  blocked:     {},                     // "src-dest" -> true
  markers:     [],
  edgeLines:   [],
  rescuedCount: 0,
  isAdmin:     false,
  selectedEdge: null,
};

/* ══════════════════════════════════════════════════════
 *  MAP INIT
 * ══════════════════════════════════════════════════════ */
const map = L.map('map', {
  center: [23.762, 90.395],
  zoom: 13,
  zoomControl: true,
  attributionControl: false,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 19,
}).addTo(map);

const svg = document.getElementById('svg-overlay');

/* ══════════════════════════════════════════════════════
 *  LOGIN
 * ══════════════════════════════════════════════════════ */
function doLogin() {
  const u = document.getElementById('login-user').value;
  const p = document.getElementById('login-pass').value;
  if (u === 'admin' && p === 'nexus123') {
    state.isAdmin = true;
    document.getElementById('login-overlay').style.display = 'none';
    log('Admin authenticated. Full access granted.', 'ok');
    log('System initialized. Map loaded.', 'info');
    document.getElementById('btn-admin').style.display = '';
  } else {
    document.getElementById('login-err').style.display = 'block';
  }
}
function publicView() {
  state.isAdmin = false;
  document.getElementById('login-overlay').style.display = 'none';
  switchView('public');
  log('Public view mode. Read-only access.', 'warn');
}
document.getElementById('login-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

/* ══════════════════════════════════════════════════════
 *  VIEW SWITCHING
 * ══════════════════════════════════════════════════════ */
function switchView(v) {
  document.getElementById('btn-admin').classList.toggle('active', v==='admin');
  document.getElementById('btn-public').classList.toggle('active', v==='public');
  const adminSections = document.querySelectorAll('#admin-section,#admin-section2');
  adminSections.forEach(s => s.style.opacity = (v==='admin' && state.isAdmin) ? '1' : '0.3');
  adminSections.forEach(s => s.style.pointerEvents = (v==='admin' && state.isAdmin) ? 'all' : 'none');
}

/* ══════════════════════════════════════════════════════
 *  TABS
 * ══════════════════════════════════════════════════════ */
function openTab(id) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const idx = ['tab-control','tab-map','tab-log'].indexOf(id);
  document.querySelectorAll('.tab')[idx].classList.add('active');
}

/* ══════════════════════════════════════════════════════
 *  LOGGING
 * ══════════════════════════════════════════════════════ */
function log(msg, type='info') {
  const el = document.getElementById('sys-log');
  const now = new Date();
  const ts = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  const entry = document.createElement('div');
  entry.className = `log-entry ${type}`;
  entry.textContent = `[${ts}] ${msg}`;
  el.prepend(entry);
}
function clearLog() { document.getElementById('sys-log').innerHTML = ''; }

/* ══════════════════════════════════════════════════════
 *  GRAPH HELPERS
 * ══════════════════════════════════════════════════════ */
function isBlocked(a, b) {
  return state.blocked[`${a}-${b}`] || state.blocked[`${b}-${a}`];
}

function getNeighbors(nodeId) {
  return EDGES
    .filter(e => (e[0]===nodeId || e[1]===nodeId) && !isBlocked(e[0],e[1]))
    .map(e => ({ id: e[0]===nodeId ? e[1] : e[0], w: e[2] }));
}

/* ── DIJKSTRA ── */
function dijkstra(src) {
  const dist = new Array(NODES.length).fill(Infinity);
  const prev = new Array(NODES.length).fill(-1);
  dist[src] = 0;
  const visited = new Set();
  const pq = [[0, src]];

  while (pq.length) {
    pq.sort((a,b) => a[0]-b[0]);
    const [d, u] = pq.shift();
    if (visited.has(u)) continue;
    visited.add(u);
    for (const {id:v, w} of getNeighbors(u)) {
      if (!visited.has(v) && d+w < dist[v]) {
        dist[v] = d+w;
        prev[v] = u;
        pq.push([dist[v], v]);
      }
    }
  }
  return { dist, prev };
}

function getPath(prev, dest) {
  const path = [];
  let cur = dest;
  while (cur !== -1) { path.unshift(cur); cur = prev[cur]; }
  return path;
}

/* ── BFS HAZARD ── */
function bfsHazard(origin, maxLevel) {
  const visited = new Set();
  const level = new Array(NODES.length).fill(-1);
  const queue = [origin];
  visited.add(origin);
  level[origin] = 0;
  const order = [];

  while (queue.length) {
    const cur = queue.shift();
    if (level[cur] > maxLevel) continue;
    order.push({ id: cur, lv: level[cur] });

    // Get ALL neighbors including blocked for hazard spread
    EDGES.forEach(e => {
      let nb = -1;
      if (e[0]===cur) nb=e[1];
      if (e[1]===cur) nb=e[0];
      if (nb>=0 && !visited.has(nb)) {
        visited.add(nb);
        level[nb] = level[cur]+1;
        queue.push(nb);
      }
    });
  }
  return order;
}

/* ══════════════════════════════════════════════════════
 *  MAP RENDERING
 * ══════════════════════════════════════════════════════ */
function latLngToSvg(lat, lng) {
  const pt = map.latLngToContainerPoint([lat, lng]);
  return { x: pt.x, y: pt.y };
}

function getNodeColor(id) {
  const lv = state.hazardLevel[id];
  if (lv === 0) return 'var(--safe)';
  if (lv === 1) return 'var(--warning)';
  return 'var(--danger)';
}

function renderMap() {
  const mapEl = document.getElementById('map');
  svg.setAttribute('width', mapEl.offsetWidth);
  svg.setAttribute('height', mapEl.offsetHeight);
  svg.innerHTML = '';

  // Draw edges
  EDGES.forEach(([a,b,w], idx) => {
    const pa = latLngToSvg(NODES[a].lat, NODES[a].lng);
    const pb = latLngToSvg(NODES[b].lat, NODES[b].lng);
    const blocked = isBlocked(a,b);

    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', pa.x); line.setAttribute('y1', pa.y);
    line.setAttribute('x2', pb.x); line.setAttribute('y2', pb.y);
    line.setAttribute('stroke', blocked ? 'rgba(255,59,59,0.5)' : 'rgba(0,229,255,0.25)');
    line.setAttribute('stroke-width', blocked ? '2' : '2');
    line.setAttribute('stroke-dasharray', blocked ? '6,4' : '');
    line.style.cursor = 'pointer';
    line.dataset.a = a; line.dataset.b = b;

    line.addEventListener('click', () => {
      if (!state.isAdmin) return;
      state.selectedEdge = [a,b];
      document.getElementById('lock-btn').style.display = '';
      log(`Road selected: ${NODES[a].name} ↔ ${NODES[b].name}`, 'warn');
    });

    svg.appendChild(line);

    // Weight label
    const mx = (pa.x+pb.x)/2, my = (pa.y+pb.y)/2;
    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x', mx); txt.setAttribute('y', my-5);
    txt.setAttribute('text-anchor','middle');
    txt.setAttribute('fill','rgba(0,229,255,0.5)');
    txt.setAttribute('font-size','10');
    txt.setAttribute('font-family','Share Tech Mono,monospace');
    txt.textContent = w;
    svg.appendChild(txt);
  });

  // Draw nodes
  NODES.forEach(n => {
    const p = latLngToSvg(n.lat, n.lng);
    const color = getNodeColor(n.id);
    const lv = state.hazardLevel[n.id];

    // Glow ring
    const ring = document.createElementNS('http://www.w3.org/2000/svg','circle');
    ring.setAttribute('cx',p.x); ring.setAttribute('cy',p.y); ring.setAttribute('r','18');
    ring.setAttribute('fill','none');
    ring.setAttribute('stroke', color);
    ring.setAttribute('stroke-width','1');
    ring.setAttribute('opacity','0.3');
    svg.appendChild(ring);

    // Main circle
    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx',p.x); circle.setAttribute('cy',p.y); circle.setAttribute('r','10');
    circle.setAttribute('fill', lv===0 ? 'rgba(0,255,136,0.15)' : lv===1 ? 'rgba(255,170,0,0.2)' : 'rgba(255,59,59,0.2)');
    circle.setAttribute('stroke', color);
    circle.setAttribute('stroke-width','2');
    circle.style.cursor = 'pointer';
    circle.style.filter = `drop-shadow(0 0 6px ${color})`;
    svg.appendChild(circle);

    // Label
    const label = document.createElementNS('http://www.w3.org/2000/svg','text');
    label.setAttribute('x',p.x); label.setAttribute('y',p.y+26);
    label.setAttribute('text-anchor','middle');
    label.setAttribute('fill', color);
    label.setAttribute('font-size','11');
    label.setAttribute('font-family','Rajdhani,sans-serif');
    label.setAttribute('font-weight','700');
    label.setAttribute('letter-spacing','1');
    label.textContent = n.name.toUpperCase();
    svg.appendChild(label);
  });

  updateNodeList();
  updateStats();
}

/* ══════════════════════════════════════════════════════
 *  UI UPDATES
 * ══════════════════════════════════════════════════════ */
function updateNodeList() {
  const el = document.getElementById('node-list');
  el.innerHTML = '';
  NODES.forEach(n => {
    const lv = state.hazardLevel[n.id];
    const cls = lv===0?'safe':lv===1?'warning':'danger';
    const label = lv===0?'SAFE':lv===1?'WARNING':'DANGER';
    el.innerHTML += `
      <div class="node-item">
        <div class="node-dot ${cls}"></div>
        <span>${n.name}</span>
        <span class="node-badge ${cls}">${label}</span>
      </div>`;
  });
}

function updateStats() {
  const safe   = state.hazardLevel.filter(l=>l===0).length;
  const danger = state.hazardLevel.filter(l=>l>0).length;
  document.getElementById('s-safe').textContent   = safe;
  document.getElementById('s-danger').textContent = danger;
  document.getElementById('s-rescued').textContent = state.rescuedCount;

  const dot = document.getElementById('sys-dot');
  const status = document.getElementById('sys-status');
  if (danger > 0) {
    dot.className = 'pulse-dot alert';
    status.textContent = `DISASTER ACTIVE — ${danger} ZONES AFFECTED`;
    status.style.color = 'var(--danger)';
  } else {
    dot.className = 'pulse-dot';
    status.textContent = 'SYSTEM NOMINAL';
    status.style.color = 'var(--dim)';
  }
}

function populateSelects() {
  const selects = ['hazard-origin','team-origin','victim-loc'];
  selects.forEach(sid => {
    const sel = document.getElementById(sid);
    sel.innerHTML = '<option value="">— select location —</option>';
    NODES.forEach(n => {
      sel.innerHTML += `<option value="${n.id}">${n.name}</option>`;
    });
  });
}

/* ══════════════════════════════════════════════════════
 *  ACTIONS
 * ══════════════════════════════════════════════════════ */
async function triggerHazard() {
  if (!state.isAdmin) return;
  const origin = parseInt(document.getElementById('hazard-origin').value);
  const level  = parseInt(document.getElementById('hazard-level').value);
  if (isNaN(origin)) { log('Select a disaster origin!', 'alert'); return; }

  log(`⚠ DISASTER TRIGGERED at ${NODES[origin].name} (spread: ${level})`, 'alert');
  const spread = bfsHazard(origin, level);

  // Animate spread with delay
  for (let i = 0; i < spread.length; i++) {
    await delay(400);
    const {id, lv} = spread[i];
    state.hazardLevel[id] = lv === 0 ? 2 : Math.min(2, lv);

    // Block all edges of affected node
    EDGES.forEach(([a,b]) => {
      if (a===id || b===id) {
        state.blocked[`${a}-${b}`] = true;
        state.blocked[`${b}-${a}`] = true;
      }
    });

    log(`${NODES[id].name} — ${lv===0?'EPICENTER':lv===1?'DANGER':'WARNING'}`, lv<=1?'alert':'warn');
    renderMap();
    animateHazardRing(id);
  }
}

function animateHazardRing(nodeId) {
  const p = latLngToSvg(NODES[nodeId].lat, NODES[nodeId].lng);
  const ring = document.createElementNS('http://www.w3.org/2000/svg','circle');
  ring.setAttribute('cx',p.x); ring.setAttribute('cy',p.y); ring.setAttribute('r','10');
  ring.setAttribute('fill','none');
  ring.setAttribute('stroke','var(--danger)');
  ring.setAttribute('stroke-width','2');
  ring.setAttribute('opacity','0.8');
  svg.appendChild(ring);

  let r = 10, op = 0.8;
  const anim = setInterval(() => {
    r += 2.5; op -= 0.06;
    ring.setAttribute('r', r);
    ring.setAttribute('opacity', op);
    if (op <= 0) { clearInterval(anim); svg.removeChild(ring); }
  }, 40);
}

async function runRescue() {
  if (!state.isAdmin) return;
  const src  = parseInt(document.getElementById('team-origin').value);
  const dest = parseInt(document.getElementById('victim-loc').value);
  if (isNaN(src) || isNaN(dest)) { log('Select team origin and victim location!', 'alert'); return; }
  if (src === dest) { log('Origin and destination cannot be same!', 'alert'); return; }

  log(`Computing rescue route: ${NODES[src].name} → ${NODES[dest].name}`, 'info');
  const { dist, prev } = dijkstra(src);

  if (dist[dest] === Infinity) {
    log(`NO ROUTE FOUND: All paths to ${NODES[dest].name} are blocked!`, 'alert');
    return;
  }

  const path = getPath(prev, dest);
  log(`Route found (cost: ${dist[dest]}): ${path.map(id=>NODES[id].name).join(' → ')}`, 'ok');

  // Draw animated route
  await animateRoute(path);
  state.rescuedCount++;
  updateStats();
  log(`Victim at ${NODES[dest].name} rescued! ✓`, 'ok');
}

async function animateRoute(path) {
  for (let i = 0; i < path.length - 1; i++) {
    await delay(500);
    const a = path[i], b = path[i+1];
    const pa = latLngToSvg(NODES[a].lat, NODES[a].lng);
    const pb = latLngToSvg(NODES[b].lat, NODES[b].lng);

    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',pa.x); line.setAttribute('y1',pa.y);
    line.setAttribute('x2',pb.x); line.setAttribute('y2',pb.y);
    line.setAttribute('stroke','var(--accent)');
    line.setAttribute('stroke-width','4');
    line.setAttribute('stroke-linecap','round');
    line.classList.add('route-line');
    line.style.filter = 'drop-shadow(0 0 8px var(--accent))';
    svg.appendChild(line);

    // Moving dot
    const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx',pa.x); dot.setAttribute('cy',pa.y); dot.setAttribute('r','5');
    dot.setAttribute('fill','var(--accent)');
    dot.style.filter = 'drop-shadow(0 0 8px var(--accent))';
    svg.appendChild(dot);
    await animateDot(dot, pa, pb);
    svg.removeChild(dot);
  }

  // Rescued marker at destination
  const dest = path[path.length-1];
  const pd = latLngToSvg(NODES[dest].lat, NODES[dest].lng);
  const rescued = document.createElementNS('http://www.w3.org/2000/svg','text');
  rescued.setAttribute('x',pd.x); rescued.setAttribute('y',pd.y-18);
  rescued.setAttribute('text-anchor','middle');
  rescued.setAttribute('fill','var(--safe)');
  rescued.setAttribute('font-size','18');
  rescued.textContent = '✓';
  rescued.style.filter = 'drop-shadow(0 0 6px var(--safe))';
  svg.appendChild(rescued);
}

function animateDot(dot, from, to) {
  return new Promise(res => {
    let t = 0;
    const anim = setInterval(() => {
      t += 0.05;
      dot.setAttribute('cx', from.x + (to.x-from.x)*t);
      dot.setAttribute('cy', from.y + (to.y-from.y)*t);
      if (t >= 1) { clearInterval(anim); res(); }
    }, 25);
  });
}

async function runBFSAnimation() {
  const origin = parseInt(document.getElementById('hazard-origin').value);
  if (isNaN(origin)) { log('Select hazard origin first!', 'alert'); return; }
  log(`BFS hazard visualization from ${NODES[origin].name}`, 'warn');
  await triggerHazard();
}

function showAllRoutes() {
  renderMap();
  log('Showing all available routes on map', 'info');
  EDGES.forEach(([a,b]) => {
    if (!isBlocked(a,b)) {
      const pa = latLngToSvg(NODES[a].lat, NODES[a].lng);
      const pb = latLngToSvg(NODES[b].lat, NODES[b].lng);
      const line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',pa.x); line.setAttribute('y1',pa.y);
      line.setAttribute('x2',pb.x); line.setAttribute('y2',pb.y);
      line.setAttribute('stroke','rgba(0,229,255,0.6)');
      line.setAttribute('stroke-width','3');
      line.style.filter = 'drop-shadow(0 0 4px var(--accent))';
      svg.appendChild(line);
    }
  });
}

function lockRoad() {
  if (!state.selectedEdge) return;
  const [a,b] = state.selectedEdge;
  state.blocked[`${a}-${b}`] = true;
  state.blocked[`${b}-${a}`] = true;
  log(`Road BLOCKED: ${NODES[a].name} ↔ ${NODES[b].name}`, 'alert');
  state.selectedEdge = null;
  document.getElementById('lock-btn').style.display = 'none';
  renderMap();
}

function resetMap() {
  state.hazardLevel = new Array(7).fill(0);
  state.blocked = {};
  state.rescuedCount = 0;
  state.selectedEdge = null;
  document.getElementById('lock-btn').style.display = 'none';
  log('Map reset. All hazards cleared.', 'ok');
  renderMap();
}

/* ══════════════════════════════════════════════════════
 *  UTILS
 * ══════════════════════════════════════════════════════ */
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

/* ══════════════════════════════════════════════════════
 *  INIT
 * ══════════════════════════════════════════════════════ */
map.on('moveend zoomend', renderMap);
window.addEventListener('resize', () => {
  svg.setAttribute('width',  document.getElementById('map').offsetWidth);
  svg.setAttribute('height', document.getElementById('map').offsetHeight);
  renderMap();
});

setTimeout(() => {
  populateSelects();
  renderMap();
  log('NEXUS RESCUE initialized.', 'info');
  log('Dhaka city map loaded. 7 nodes, 9 edges.', 'info');
}, 300);

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') resetMap();
});
</script>
