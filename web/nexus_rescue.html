<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS RESCUE — Disaster Route Optimizer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root {
  --bg:       #050d14;
  --panel:    #0a1520;
  --border:   #0f2a3d;
  --accent:   #00e5ff;
  --danger:   #ff3b3b;
  --warning:  #ffaa00;
  --safe:     #00ff88;
  --team1:    #00e5ff;
  --team2:    #ff6ec7;
  --team3:    #ffe066;
  --text:     #c8dce8;
  --dim:      #4a6a7d;
  --glow:     0 0 12px rgba(0,229,255,0.4);
  --glow-red: 0 0 12px rgba(255,59,59,0.5);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,255,0.012) 2px,rgba(0,229,255,0.012) 4px);pointer-events:none;z-index:9999;}

/* HEADER */
header{height:52px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;position:relative;z-index:1000;}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);}
.logo{font-family:'Orbitron',monospace;font-size:18px;font-weight:900;color:var(--accent);letter-spacing:4px;text-shadow:var(--glow);}
.logo span{color:var(--danger);}
.header-right{display:flex;align-items:center;gap:16px;}
.status-indicator{display:flex;align-items:center;gap:6px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--dim);}
.pulse-dot{width:7px;height:7px;border-radius:50%;background:var(--safe);animation:pulse 1.5s infinite;}
.pulse-dot.alert{background:var(--danger);animation:pulse-fast 0.6s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
@keyframes pulse-fast{0%,100%{opacity:1;}50%{opacity:0.2;}}
.view-toggle{display:flex;gap:4px;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:3px;}
.view-btn{padding:4px 12px;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;border:none;border-radius:3px;cursor:pointer;background:transparent;color:var(--dim);transition:all .2s;}
.view-btn.active{background:var(--accent);color:var(--bg);box-shadow:var(--glow);}

/* LAYOUT */
.main{flex:1;display:flex;overflow:hidden;}
#map{flex:1;position:relative;z-index:1;}
#svg-overlay{position:absolute;inset:0;pointer-events:none;z-index:400;}

/* SIDEBAR */
.sidebar{width:330px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.tab{flex:1;padding:11px 4px;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;text-align:center;cursor:pointer;color:var(--dim);border:none;background:transparent;border-bottom:2px solid transparent;transition:all .2s;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-content{display:none;flex:1;overflow-y:auto;padding:14px;flex-direction:column;gap:10px;}
.tab-content.active{display:flex;}
.tab-content::-webkit-scrollbar{width:4px;}
.tab-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* CARDS */
.card{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:6px;padding:12px;}
.card-title{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--accent);margin-bottom:10px;font-family:'Share Tech Mono',monospace;}

/* BUTTONS */
.btn{width:100%;padding:8px 12px;border:1px solid var(--border);background:rgba(0,229,255,0.06);color:var(--accent);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;letter-spacing:1px;border-radius:4px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px;}
.btn:hover{background:rgba(0,229,255,0.15);box-shadow:var(--glow);}
.btn.danger{border-color:var(--danger);color:var(--danger);background:rgba(255,59,59,0.06);}
.btn.danger:hover{background:rgba(255,59,59,0.15);box-shadow:var(--glow-red);}
.btn.success{border-color:var(--safe);color:var(--safe);background:rgba(0,255,136,0.06);}
.btn.warn{border-color:var(--warning);color:var(--warning);background:rgba(255,170,0,0.06);}
.btn:disabled{opacity:0.3;cursor:not-allowed;}

/* FORM */
select,input[type=text],input[type=password]{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:13px;padding:7px 10px;border-radius:4px;outline:none;transition:border-color .2s;}
select:focus,input:focus{border-color:var(--accent);}
select option{background:var(--panel);}
label{font-size:10px;color:var(--dim);letter-spacing:1px;display:block;margin-bottom:3px;font-family:'Share Tech Mono',monospace;}

/* STATS */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.stat{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:4px;padding:7px;text-align:center;}
.stat-val{font-family:'Orbitron',monospace;font-size:18px;font-weight:700;line-height:1;}
.stat-val.cyan{color:var(--accent);text-shadow:var(--glow);}
.stat-val.red{color:var(--danger);}
.stat-val.green{color:var(--safe);}
.stat-val.yellow{color:var(--warning);}
.stat-label{font-family:'Share Tech Mono',monospace;font-size:7px;color:var(--dim);letter-spacing:1px;margin-top:3px;}

/* TEAM LIST */
.team-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:4px;background:rgba(255,255,255,0.02);border:1px solid var(--border);font-size:12px;font-weight:600;}
.team-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.team-badge{margin-left:auto;font-size:9px;font-family:'Share Tech Mono',monospace;padding:2px 7px;border-radius:2px;}

/* VICTIM LIST */
.victim-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:4px;background:rgba(255,59,59,0.05);border:1px solid rgba(255,59,59,0.2);font-size:12px;font-weight:600;}
.victim-icon{font-size:14px;}

/* LOG */
.log{background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:4px;padding:8px;max-height:200px;overflow-y:auto;font-family:'Share Tech Mono',monospace;font-size:10px;line-height:1.7;}
.log::-webkit-scrollbar{width:3px;}
.log::-webkit-scrollbar-thumb{background:var(--border);}
.log-entry{padding:1px 0;border-bottom:1px solid rgba(255,255,255,0.03);}
.log-entry.info{color:var(--accent);}
.log-entry.alert{color:var(--danger);}
.log-entry.ok{color:var(--safe);}
.log-entry.warn{color:var(--warning);}

/* NODE LIST */
.node-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:4px;background:rgba(255,255,255,0.02);border:1px solid var(--border);font-size:12px;font-weight:600;}
.node-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.node-dot.safe{background:var(--safe);box-shadow:0 0 6px var(--safe);}
.node-dot.warning{background:var(--warning);box-shadow:0 0 6px var(--warning);}
.node-dot.danger{background:var(--danger);box-shadow:0 0 6px var(--danger);}
.node-badge{margin-left:auto;font-size:9px;font-family:'Share Tech Mono',monospace;padding:2px 6px;border-radius:2px;}
.node-badge.safe{background:rgba(0,255,136,0.12);color:var(--safe);}
.node-badge.warning{background:rgba(255,170,0,0.12);color:var(--warning);}
.node-badge.danger{background:rgba(255,59,59,0.12);color:var(--danger);}

/* SEC LABEL */
.sec-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;}

/* LOGIN */
#login-overlay{position:fixed;inset:0;background:rgba(5,13,20,0.96);display:flex;align-items:center;justify-content:center;z-index:9000;backdrop-filter:blur(4px);}
.login-box{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:36px;width:340px;display:flex;flex-direction:column;gap:14px;position:relative;}
.login-box::before{content:'';position:absolute;top:0;left:10%;right:10%;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);}
.login-title{font-family:'Orbitron',monospace;font-size:15px;font-weight:900;color:var(--accent);letter-spacing:3px;text-align:center;text-shadow:var(--glow);}
.login-sub{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim);text-align:center;letter-spacing:2px;}
.login-btn{padding:11px;background:linear-gradient(135deg,rgba(0,229,255,0.15),rgba(0,229,255,0.05));border:1px solid var(--accent);color:var(--accent);font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:2px;border-radius:4px;cursor:pointer;transition:all .2s;width:100%;}
.login-btn:hover{background:rgba(0,229,255,0.25);box-shadow:var(--glow);}
.login-hint{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--dim);text-align:center;opacity:.6;}
.login-err{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--danger);text-align:center;display:none;}

/* ROUTE ANIMATION */
@keyframes route-draw{from{stroke-dashoffset:2000;}to{stroke-dashoffset:0;}}
.route-line{stroke-dasharray:2000;stroke-dashoffset:2000;animation:route-draw 1.2s ease forwards;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-overlay">
  <div class="login-box">
    <div class="login-title">NEXUS RESCUE</div>
    <div class="login-sub">ADMIN AUTHENTICATION REQUIRED</div>
    <div><label>USERNAME</label><input type="text" id="login-user" placeholder="admin" value="admin"/></div>
    <div><label>PASSWORD</label><input type="password" id="login-pass" placeholder="••••••••"/></div>
    <div class="login-err" id="login-err">⚠ INVALID CREDENTIALS</div>
    <button class="login-btn" onclick="doLogin()">ACCESS SYSTEM</button>
    <div class="login-hint">hint: admin / nexus123</div>
    <button class="login-btn" style="background:transparent;border-color:var(--dim);color:var(--dim);font-size:10px;margin-top:4px;" onclick="publicView()">CONTINUE AS PUBLIC →</button>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">NEXUS <span>RESCUE</span></div>
  <div class="header-right">
    <div class="status-indicator">
      <div class="pulse-dot" id="sys-dot"></div>
      <span id="sys-status">SYSTEM NOMINAL</span>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" id="btn-admin" onclick="switchView('admin')">ADMIN</button>
      <button class="view-btn" id="btn-public" onclick="switchView('public')">PUBLIC</button>
    </div>
  </div>
</header>

<!-- MAIN -->
<div class="main">
  <div style="flex:1;position:relative;">
    <div id="map"></div>
    <svg id="svg-overlay"></svg>
  </div>

  <div class="sidebar">
    <div class="sidebar-tabs">
      <button class="tab active" onclick="openTab('tab-control')">CONTROL</button>
      <button class="tab" onclick="openTab('tab-teams')">TEAMS</button>
      <button class="tab" onclick="openTab('tab-map')">MAP</button>
      <button class="tab" onclick="openTab('tab-log')">LOG</button>
    </div>

    <!-- CONTROL TAB -->
    <div class="tab-content active" id="tab-control">
      <div class="stats-bar">
        <div class="stat"><div class="stat-val cyan" id="s-safe">7</div><div class="stat-label">SAFE</div></div>
        <div class="stat"><div class="stat-val red"  id="s-danger">0</div><div class="stat-label">DANGER</div></div>
        <div class="stat"><div class="stat-val green" id="s-rescued">0</div><div class="stat-label">RESCUED</div></div>
        <div class="stat"><div class="stat-val yellow" id="s-stranded">0</div><div class="stat-label">STRANDED</div></div>
      </div>

      <div class="card" id="hazard-card">
        <div class="card-title">🌊 HAZARD CONTROL</div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <div><label>DISASTER ORIGIN</label>
            <select id="hazard-origin"><option value="">— select —</option></select></div>
          <div><label>SPREAD RADIUS</label>
            <select id="hazard-level">
              <option value="1">Level 1 — Immediate</option>
              <option value="2">Level 2 — Wide</option>
              <option value="3">Level 3 — City-wide</option>
            </select></div>
          <button class="btn danger" onclick="triggerHazard()">🌊 TRIGGER DISASTER</button>
          <button class="btn" onclick="resetMap()">↺ RESET MAP</button>
        </div>
      </div>

      <div class="card" id="victim-card">
        <div class="card-title">🆘 ADD VICTIM</div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <div><label>VICTIM LOCATION</label>
            <select id="victim-loc"><option value="">— select —</option></select></div>
          <button class="btn danger" onclick="addVictim()">+ ADD VICTIM</button>
        </div>
      </div>

      <div class="card" id="rescue-card">
        <div class="card-title">🚁 RESCUE OPERATION</div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <button class="btn success" onclick="runGreedyAssignment()">▶ AUTO-ASSIGN ALL TEAMS</button>
          <div style="display:flex;gap:6px;">
            <div style="flex:1"><label>TEAM</label>
              <select id="manual-team"><option value="">— team —</option></select></div>
            <div style="flex:1"><label>VICTIM</label>
              <select id="manual-victim"><option value="">— victim —</option></select></div>
          </div>
          <button class="btn" onclick="runManualRescue()">▶ MANUAL ASSIGN</button>
        </div>
      </div>
    </div>

    <!-- TEAMS TAB -->
    <div class="tab-content" id="tab-teams">
      <div class="sec-label">RESCUE TEAMS</div>
      <div id="team-list" style="display:flex;flex-direction:column;gap:6px;"></div>
      <div class="sec-label" style="margin-top:8px;">VICTIMS</div>
      <div id="victim-list" style="display:flex;flex-direction:column;gap:6px;"></div>
    </div>

    <!-- MAP TAB -->
    <div class="tab-content" id="tab-map">
      <div class="sec-label">LOCATION STATUS</div>
      <div id="node-list" style="display:flex;flex-direction:column;gap:4px;"></div>
    </div>

    <!-- LOG TAB -->
    <div class="tab-content" id="tab-log">
      <div class="sec-label">SYSTEM LOG</div>
      <div class="log" id="sys-log"></div>
      <button class="btn" style="margin-top:4px;" onclick="clearLog()">🗑 CLEAR LOG</button>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════
 *  DATA
 * ══════════════════════════════════════════ */
const NODES = [
  {id:0,name:"Mirpur",    lat:23.8041,lng:90.3664},
  {id:1,name:"Farmgate",  lat:23.7591,lng:90.3897},
  {id:2,name:"Gulshan",   lat:23.7806,lng:90.4152},
  {id:3,name:"Mohakhali", lat:23.7770,lng:90.4050},
  {id:4,name:"Dhanmondi", lat:23.7461,lng:90.3742},
  {id:5,name:"Motijheel", lat:23.7330,lng:90.4178},
  {id:6,name:"Badda",     lat:23.7772,lng:90.4367},
];
const EDGES = [
  [0,1,5],[1,2,4],[1,4,3],[2,3,2],
  [3,6,3],[6,5,6],[4,5,7],[0,4,8],[3,5,5]
];
const TEAM_COLORS = ['#00e5ff','#ff6ec7','#ffe066'];
const TEAM_NAMES  = ['Alpha Team','Bravo Team','Delta Team'];
const TEAM_BASES  = [5, 6, 3]; // Motijheel, Badda, Mohakhali

/* ══════════════════════════════════════════
 *  STATE
 * ══════════════════════════════════════════ */
let state = {
  hazardLevel: new Array(7).fill(0),
  blocked:     {},
  teams: TEAM_NAMES.map((name,i) => ({
    id:i+1, name, location:TEAM_BASES[i],
    available:true, color:TEAM_COLORS[i]
  })),
  victims:     [],
  victimCounter: 0,
  isAdmin:     false,
  routeElements: [],
};

/* ══════════════════════════════════════════
 *  MAP
 * ══════════════════════════════════════════ */
const map = L.map('map',{center:[23.762,90.395],zoom:13,zoomControl:true,attributionControl:false});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
const svg = document.getElementById('svg-overlay');

/* ══════════════════════════════════════════
 *  LOGIN
 * ══════════════════════════════════════════ */
function doLogin(){
  if(document.getElementById('login-user').value==='admin' &&
     document.getElementById('login-pass').value==='nexus123'){
    state.isAdmin=true;
    document.getElementById('login-overlay').style.display='none';
    log('Admin authenticated. Full access granted.','ok');
    log('NEXUS RESCUE initialized. 7 nodes, 9 edges.','info');
    setAdminAccess(true);
  } else {
    document.getElementById('login-err').style.display='block';
  }
}
function publicView(){
  state.isAdmin=false;
  document.getElementById('login-overlay').style.display='none';
  switchView('public');
  log('Public view mode. Read-only access.','warn');
}
document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

function setAdminAccess(on){
  ['hazard-card','victim-card','rescue-card'].forEach(id=>{
    const el=document.getElementById(id);
    el.style.opacity=on?'1':'0.3';
    el.style.pointerEvents=on?'all':'none';
  });
}

function switchView(v){
  document.getElementById('btn-admin').classList.toggle('active',v==='admin');
  document.getElementById('btn-public').classList.toggle('active',v==='public');
  setAdminAccess(v==='admin' && state.isAdmin);
}

/* ══════════════════════════════════════════
 *  TABS
 * ══════════════════════════════════════════ */
function openTab(id){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const idx=['tab-control','tab-teams','tab-map','tab-log'].indexOf(id);
  document.querySelectorAll('.tab')[idx].classList.add('active');
}

/* ══════════════════════════════════════════
 *  LOGGING
 * ══════════════════════════════════════════ */
function log(msg,type='info'){
  const el=document.getElementById('sys-log');
  const now=new Date();
  const ts=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  const entry=document.createElement('div');
  entry.className=`log-entry ${type}`;
  entry.textContent=`[${ts}] ${msg}`;
  el.prepend(entry);
}
function clearLog(){document.getElementById('sys-log').innerHTML='';}

/* ══════════════════════════════════════════
 *  GRAPH HELPERS
 * ══════════════════════════════════════════ */
function isBlocked(a,b){return state.blocked[`${a}-${b}`]||state.blocked[`${b}-${a}`];}

function getNeighbors(id){
  return EDGES
    .filter(e=>(e[0]===id||e[1]===id)&&!isBlocked(e[0],e[1]))
    .map(e=>({id:e[0]===id?e[1]:e[0],w:e[2]}));
}

/* DIJKSTRA */
function dijkstra(src){
  const dist=new Array(NODES.length).fill(Infinity);
  const prev=new Array(NODES.length).fill(-1);
  dist[src]=0;
  const visited=new Set();
  const pq=[[0,src]];
  while(pq.length){
    pq.sort((a,b)=>a[0]-b[0]);
    const[d,u]=pq.shift();
    if(visited.has(u))continue;
    visited.add(u);
    for(const{id:v,w}of getNeighbors(u)){
      if(!visited.has(v)&&d+w<dist[v]){
        dist[v]=d+w;prev[v]=u;pq.push([dist[v],v]);
      }
    }
  }
  return{dist,prev};
}

function getPath(prev,dest){
  const path=[];let cur=dest;
  while(cur!==-1){path.unshift(cur);cur=prev[cur];}
  return path;
}

/* BFS HAZARD */
function bfsHazard(origin,maxLevel){
  const visited=new Set();
  const level=new Array(NODES.length).fill(-1);
  const queue=[origin];
  visited.add(origin);level[origin]=0;
  const order=[];
  while(queue.length){
    const cur=queue.shift();
    if(level[cur]>maxLevel)continue;
    order.push({id:cur,lv:level[cur]});
    EDGES.forEach(e=>{
      let nb=-1;
      if(e[0]===cur)nb=e[1];
      if(e[1]===cur)nb=e[0];
      if(nb>=0&&!visited.has(nb)){
        visited.add(nb);level[nb]=level[cur]+1;queue.push(nb);
      }
    });
  }
  return order;
}

/* ══════════════════════════════════════════
 *  GREEDY TEAM ASSIGNMENT (from C Module 4)
 * ══════════════════════════════════════════ */
async function runGreedyAssignment(){
  if(!state.isAdmin)return;
  const unrescued=state.victims.filter(v=>!v.rescued);
  if(unrescued.length===0){log('No victims to rescue!','warn');return;}

  log('Starting greedy team assignment...','info');
  let rescued=0,stranded=0;

  for(const victim of unrescued){
    let bestTeam=null,bestDist=Infinity,bestPath=[];

    // Find nearest available team — GREEDY STEP
    for(const team of state.teams){
      if(!team.available)continue;
      const{dist,prev}=dijkstra(team.location);
      const d=dist[victim.location];
      if(d<bestDist){
        bestDist=d;bestTeam=team;
        bestPath=getPath(prev,victim.location);
      }
    }

    if(!bestTeam||bestDist===Infinity){
      log(`[X] No route to Victim #${victim.id} at ${NODES[victim.location].name}!`,'alert');
      stranded++;
      continue;
    }

    // Assign
    bestTeam.available=false;
    victim.rescued=true;
    victim.assignedTeam=bestTeam.id;

    log(`[✓] ${bestTeam.name} → Victim #${victim.id} @ ${NODES[victim.location].name} (cost: ${bestDist})`,'ok');
    log(`    Route: ${bestPath.map(id=>NODES[id].name).join(' → ')}`,'info');

    await animateRoute(bestPath, bestTeam.color);
    rescued++;
    updateStats();
    updateTeamList();
  }

  log(`Mission complete. Rescued: ${rescued} | Stranded: ${stranded}`, rescued>0?'ok':'alert');
}

async function runManualRescue(){
  if(!state.isAdmin)return;
  const tid=parseInt(document.getElementById('manual-team').value);
  const vid=parseInt(document.getElementById('manual-victim').value);
  if(isNaN(tid)||isNaN(vid)){log('Select team and victim!','warn');return;}

  const team=state.teams.find(t=>t.id===tid);
  const victim=state.victims.find(v=>v.id===vid);
  if(!team||!victim){log('Invalid selection','alert');return;}
  if(!team.available){log(`${team.name} is already on mission!`,'warn');return;}
  if(victim.rescued){log(`Victim #${victim.id} already rescued!`,'warn');return;}

  const{dist,prev}=dijkstra(team.location);
  const d=dist[victim.location];
  if(d===Infinity){log(`No route from ${team.name} to Victim #${victim.id}!`,'alert');return;}

  const path=getPath(prev,victim.location);
  team.available=false;
  victim.rescued=true;
  victim.assignedTeam=team.id;

  log(`[✓] ${team.name} → Victim #${victim.id} @ ${NODES[victim.location].name} (cost: ${d})`,'ok');
  await animateRoute(path,team.color);
  updateStats();
  updateTeamList();
}

/* ══════════════════════════════════════════
 *  HAZARD
 * ══════════════════════════════════════════ */
async function triggerHazard(){
  if(!state.isAdmin)return;
  const origin=parseInt(document.getElementById('hazard-origin').value);
  const level=parseInt(document.getElementById('hazard-level').value);
  if(isNaN(origin)){log('Select disaster origin!','alert');return;}

  log(`⚠ DISASTER at ${NODES[origin].name} (spread level: ${level})`,'alert');
  const spread=bfsHazard(origin,level);

  for(const{id,lv}of spread){
    await delay(380);
    state.hazardLevel[id]=lv===0?2:Math.min(2,lv);
    EDGES.forEach(([a,b])=>{
      if(a===id||b===id){
        state.blocked[`${a}-${b}`]=true;
        state.blocked[`${b}-${a}`]=true;
      }
    });
    log(`${NODES[id].name} — ${lv===0?'EPICENTER':lv===1?'DANGER':'WARNING'}`,lv<=1?'alert':'warn');
    renderMap();
    animateHazardRing(id);
  }
  updateStats();
}

/* ══════════════════════════════════════════
 *  VICTIM MANAGEMENT
 * ══════════════════════════════════════════ */
function addVictim(){
  if(!state.isAdmin)return;
  const loc=parseInt(document.getElementById('victim-loc').value);
  if(isNaN(loc)){log('Select victim location!','alert');return;}

  state.victimCounter++;
  const victim={id:state.victimCounter,location:loc,rescued:false,assignedTeam:null};
  state.victims.push(victim);
  log(`Victim #${victim.id} added at ${NODES[loc].name}`,'warn');
  renderMap();
  updateTeamList();
  updateStats();
  populateManualSelects();
}

/* ══════════════════════════════════════════
 *  RENDER
 * ══════════════════════════════════════════ */
function lp(lat,lng){return map.latLngToContainerPoint([lat,lng]);}

function renderMap(){
  const mapEl=document.getElementById('map');
  svg.setAttribute('width',mapEl.offsetWidth);
  svg.setAttribute('height',mapEl.offsetHeight);

  // Keep route elements, clear rest
  const keep=Array.from(svg.children).filter(el=>el.dataset.keep==='1');
  svg.innerHTML='';
  keep.forEach(el=>svg.appendChild(el));

  // Edges
  EDGES.forEach(([a,b,w])=>{
    const pa=lp(NODES[a].lat,NODES[a].lng);
    const pb=lp(NODES[b].lat,NODES[b].lng);
    const blocked=isBlocked(a,b);
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',pa.x);line.setAttribute('y1',pa.y);
    line.setAttribute('x2',pb.x);line.setAttribute('y2',pb.y);
    line.setAttribute('stroke',blocked?'rgba(255,59,59,0.5)':'rgba(0,229,255,0.22)');
    line.setAttribute('stroke-width','2');
    line.setAttribute('stroke-dasharray',blocked?'6,4':'');
    svg.appendChild(line);

    // Weight
    const mx=(pa.x+pb.x)/2,my=(pa.y+pb.y)/2;
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',mx);t.setAttribute('y',my-5);
    t.setAttribute('text-anchor','middle');
    t.setAttribute('fill','rgba(0,229,255,0.45)');
    t.setAttribute('font-size','10');
    t.setAttribute('font-family','Share Tech Mono,monospace');
    t.textContent=w;
    svg.appendChild(t);
  });

  // Nodes
  NODES.forEach(n=>{
    const p=lp(n.lat,n.lng);
    const lv=state.hazardLevel[n.id];
    const color=lv===0?'var(--safe)':lv===1?'var(--warning)':'var(--danger)';

    // Ring
    const ring=document.createElementNS('http://www.w3.org/2000/svg','circle');
    ring.setAttribute('cx',p.x);ring.setAttribute('cy',p.y);ring.setAttribute('r','18');
    ring.setAttribute('fill','none');ring.setAttribute('stroke',color);
    ring.setAttribute('stroke-width','1');ring.setAttribute('opacity','0.25');
    svg.appendChild(ring);

    // Circle
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',p.x);c.setAttribute('cy',p.y);c.setAttribute('r','10');
    c.setAttribute('fill',lv===0?'rgba(0,255,136,0.12)':lv===1?'rgba(255,170,0,0.18)':'rgba(255,59,59,0.18)');
    c.setAttribute('stroke',color);c.setAttribute('stroke-width','2');
    c.style.filter=`drop-shadow(0 0 6px ${color})`;
    svg.appendChild(c);

    // Label
    const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('x',p.x);lbl.setAttribute('y',p.y+26);
    lbl.setAttribute('text-anchor','middle');lbl.setAttribute('fill',color);
    lbl.setAttribute('font-size','11');lbl.setAttribute('font-family','Rajdhani,sans-serif');
    lbl.setAttribute('font-weight','700');lbl.setAttribute('letter-spacing','1');
    lbl.textContent=n.name.toUpperCase();
    svg.appendChild(lbl);
  });

  // Team markers
  state.teams.forEach(team=>{
    const n=NODES[team.location];
    const p=lp(n.lat,n.lng);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',p.x+14);t.setAttribute('y',p.y-14);
    t.setAttribute('fill',team.color);t.setAttribute('font-size','14');
    t.style.filter=`drop-shadow(0 0 5px ${team.color})`;
    t.textContent=team.available?'🚁':'✈';
    svg.appendChild(t);
  });

  // Victim markers
  state.victims.forEach(v=>{
    if(v.rescued)return;
    const n=NODES[v.location];
    const p=lp(n.lat,n.lng);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',p.x-14);t.setAttribute('y',p.y-14);
    t.setAttribute('fill','var(--danger)');t.setAttribute('font-size','14');
    t.style.filter='drop-shadow(0 0 5px var(--danger))';
    t.textContent='🆘';
    svg.appendChild(t);

    const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('x',p.x-14);lbl.setAttribute('y',p.y-28);
    lbl.setAttribute('text-anchor','middle');lbl.setAttribute('fill','var(--danger)');
    lbl.setAttribute('font-size','9');lbl.setAttribute('font-family','Share Tech Mono,monospace');
    lbl.textContent=`V#${v.id}`;
    svg.appendChild(lbl);
  });

  updateNodeList();
}

/* ══════════════════════════════════════════
 *  ANIMATIONS
 * ══════════════════════════════════════════ */
async function animateRoute(path,color='#00e5ff'){
  for(let i=0;i<path.length-1;i++){
    await delay(480);
    const a=path[i],b=path[i+1];
    const pa=lp(NODES[a].lat,NODES[a].lng);
    const pb=lp(NODES[b].lat,NODES[b].lng);

    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',pa.x);line.setAttribute('y1',pa.y);
    line.setAttribute('x2',pb.x);line.setAttribute('y2',pb.y);
    line.setAttribute('stroke',color);line.setAttribute('stroke-width','4');
    line.setAttribute('stroke-linecap','round');
    line.classList.add('route-line');
    line.style.filter=`drop-shadow(0 0 8px ${color})`;
    line.dataset.keep='1';
    svg.appendChild(line);

    const dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx',pa.x);dot.setAttribute('cy',pa.y);dot.setAttribute('r','5');
    dot.setAttribute('fill',color);dot.style.filter=`drop-shadow(0 0 8px ${color})`;
    svg.appendChild(dot);
    await animateDot(dot,pa,pb);
    svg.removeChild(dot);
  }

  // Rescued checkmark
  const dest=path[path.length-1];
  const pd=lp(NODES[dest].lat,NODES[dest].lng);
  const check=document.createElementNS('http://www.w3.org/2000/svg','text');
  check.setAttribute('x',pd.x);check.setAttribute('y',pd.y-20);
  check.setAttribute('text-anchor','middle');check.setAttribute('fill','var(--safe)');
  check.setAttribute('font-size','20');check.setAttribute('font-family','Rajdhani,sans-serif');
  check.style.filter='drop-shadow(0 0 6px var(--safe))';
  check.textContent='✓';
  check.dataset.keep='1';
  svg.appendChild(check);
}

function animateDot(dot,from,to){
  return new Promise(res=>{
    let t=0;
    const anim=setInterval(()=>{
      t+=0.05;
      dot.setAttribute('cx',from.x+(to.x-from.x)*t);
      dot.setAttribute('cy',from.y+(to.y-from.y)*t);
      if(t>=1){clearInterval(anim);res();}
    },25);
  });
}

function animateHazardRing(nodeId){
  const p=lp(NODES[nodeId].lat,NODES[nodeId].lng);
  const ring=document.createElementNS('http://www.w3.org/2000/svg','circle');
  ring.setAttribute('cx',p.x);ring.setAttribute('cy',p.y);ring.setAttribute('r','10');
  ring.setAttribute('fill','none');ring.setAttribute('stroke','var(--danger)');
  ring.setAttribute('stroke-width','2');ring.setAttribute('opacity','0.9');
  svg.appendChild(ring);
  let r=10,op=0.9;
  const anim=setInterval(()=>{
    r+=3;op-=0.07;
    ring.setAttribute('r',r);ring.setAttribute('opacity',op);
    if(op<=0){clearInterval(anim);if(ring.parentNode)svg.removeChild(ring);}
  },35);
}

/* ══════════════════════════════════════════
 *  UI UPDATES
 * ══════════════════════════════════════════ */
function updateStats(){
  const safe=state.hazardLevel.filter(l=>l===0).length;
  const danger=state.hazardLevel.filter(l=>l>0).length;
  const rescued=state.victims.filter(v=>v.rescued).length;
  const stranded=state.victims.filter(v=>!v.rescued).length;
  document.getElementById('s-safe').textContent=safe;
  document.getElementById('s-danger').textContent=danger;
  document.getElementById('s-rescued').textContent=rescued;
  document.getElementById('s-stranded').textContent=stranded;

  const dot=document.getElementById('sys-dot');
  const status=document.getElementById('sys-status');
  if(danger>0){
    dot.className='pulse-dot alert';
    status.textContent=`DISASTER ACTIVE — ${danger} ZONES`;
    status.style.color='var(--danger)';
  } else {
    dot.className='pulse-dot';
    status.textContent='SYSTEM NOMINAL';
    status.style.color='var(--dim)';
  }
}

function updateTeamList(){
  const tl=document.getElementById('team-list');
  tl.innerHTML='';
  state.teams.forEach(team=>{
    tl.innerHTML+=`
    <div class="team-item">
      <div class="team-dot" style="background:${team.color};box-shadow:0 0 6px ${team.color};"></div>
      <span>${team.name}</span>
      <span style="font-size:11px;color:var(--dim);">@ ${NODES[team.location].name}</span>
      <span class="team-badge" style="background:${team.available?'rgba(0,255,136,0.12)':'rgba(255,170,0,0.12)'};color:${team.available?'var(--safe)':'var(--warning)'};">
        ${team.available?'READY':'MISSION'}
      </span>
    </div>`;
  });

  const vl=document.getElementById('victim-list');
  vl.innerHTML='';
  if(state.victims.length===0){
    vl.innerHTML='<div style="color:var(--dim);font-size:11px;font-family:Share Tech Mono,monospace;padding:8px;">No victims added yet.</div>';
    return;
  }
  state.victims.forEach(v=>{
    const team=v.assignedTeam?state.teams.find(t=>t.id===v.assignedTeam):null;
    vl.innerHTML+=`
    <div class="victim-item">
      <span class="victim-icon">${v.rescued?'✓':'🆘'}</span>
      <div>
        <div style="font-size:12px;font-weight:700;">Victim #${v.id}</div>
        <div style="font-size:10px;color:var(--dim);font-family:Share Tech Mono,monospace;">${NODES[v.location].name}</div>
      </div>
      <span class="team-badge" style="margin-left:auto;background:${v.rescued?'rgba(0,255,136,0.12)':'rgba(255,59,59,0.12)'};color:${v.rescued?'var(--safe)':'var(--danger)'};">
        ${v.rescued?`RESCUED`:'WAITING'}
      </span>
    </div>`;
  });
}

function updateNodeList(){
  const el=document.getElementById('node-list');
  el.innerHTML='';
  NODES.forEach(n=>{
    const lv=state.hazardLevel[n.id];
    const cls=lv===0?'safe':lv===1?'warning':'danger';
    const label=lv===0?'SAFE':lv===1?'WARNING':'DANGER';
    el.innerHTML+=`
    <div class="node-item">
      <div class="node-dot ${cls}"></div>
      <span>${n.name}</span>
      <span class="node-badge ${cls}">${label}</span>
    </div>`;
  });
}

function populateSelects(){
  ['hazard-origin','victim-loc'].forEach(sid=>{
    const sel=document.getElementById(sid);
    sel.innerHTML='<option value="">— select —</option>';
    NODES.forEach(n=>sel.innerHTML+=`<option value="${n.id}">${n.name}</option>`);
  });
}

function populateManualSelects(){
  const ts=document.getElementById('manual-team');
  ts.innerHTML='<option value="">— team —</option>';
  state.teams.filter(t=>t.available).forEach(t=>
    ts.innerHTML+=`<option value="${t.id}">${t.name}</option>`);

  const vs=document.getElementById('manual-victim');
  vs.innerHTML='<option value="">— victim —</option>';
  state.victims.filter(v=>!v.rescued).forEach(v=>
    vs.innerHTML+=`<option value="${v.id}">Victim #${v.id} @ ${NODES[v.location].name}</option>`);
}

function resetMap(){
  state.hazardLevel=new Array(7).fill(0);
  state.blocked={};
  state.victims=[];
  state.victimCounter=0;
  state.teams=TEAM_NAMES.map((name,i)=>({
    id:i+1,name,location:TEAM_BASES[i],available:true,color:TEAM_COLORS[i]
  }));
  log('Map reset. All hazards cleared.','ok');
  renderMap();
  updateStats();
  updateTeamList();
  populateManualSelects();
}

/* ══════════════════════════════════════════
 *  UTILS
 * ══════════════════════════════════════════ */
function delay(ms){return new Promise(r=>setTimeout(r,ms));}

/* ══════════════════════════════════════════
 *  INIT
 * ══════════════════════════════════════════ */
map.on('moveend zoomend',renderMap);
window.addEventListener('resize',()=>{
  svg.setAttribute('width',document.getElementById('map').offsetWidth);
  svg.setAttribute('height',document.getElementById('map').offsetHeight);
  renderMap();
});
document.addEventListener('keydown',e=>{if(e.key==='Escape')resetMap();});

setTimeout(()=>{
  populateSelects();
  populateManualSelects();
  renderMap();
  updateTeamList();
  updateStats();
},300);
</script>
